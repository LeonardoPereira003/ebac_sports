    <!DOCTYPE html>
    <html lang="pt-BR">
    <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora de IMC</title>
    <link rel="stylesheet" href="./style.css" />
    </head>
    <body>
    <div class="container">
        <header>
        <h1>Calculadora de IMC</h1>
        <p>Informe sua altura e peso para calcular o IMC.</p>
        </header>

        <form class="card" onsubmit="event.preventDefault();">
        <div class="field">
            <label for="altura">Altura (m)</label>
            <input
            id="altura"
            type="text"
            placeholder="Ex.: 1,75"
            />
        </div>

        <div class="field">
            <label for="peso">Peso (kg)</label>
            <input
            id="peso"
            type="text"
            placeholder="Ex.: 70,5"
            />
        </div>

        <div class="actions">
            <button type="button" onclick="calcular()">Calcular</button>
            <button type="button" onclick="limpar()">Limpar</button>
        </div>
        </form>

        <section class="results">
        <div class="card" id="resultadoContainer">
            <h2>Resultado</h2>
            <p id="resultado" class="muted">Informe os dados acima.</p>
        </div>

        <div class="card">
            <h3>Tabela de referência (OMS)</h3>
            <table class="table compact">
            <thead>
                <tr>
                <th>IMC</th>
                <th>Categoria</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>&lt; 18,5</td><td>Magreza</td></tr>
                <tr><td>18,5 – 24,9</td><td>Normal</td></tr>
                <tr><td>25,0 – 29,9</td><td>Sobrepeso</td></tr>
                <tr><td>30,0 – 34,9</td><td>Obesidade I</td></tr>
                <tr><td>35,0 – 39,9</td><td>Obesidade II</td></tr>
                <tr><td>&ge; 40,0</td><td>Obesidade III</td></tr>
            </tbody>
            </table>
        </div>
        </section>

        <footer>
        <small>Feito em HTML + CSS + JavaScript.</small>
        </footer>
    </div>

    <script src="script.js"></script>
    </body>
    </html>
